<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
  .row{display:flex;align-items:flex-end;gap:16px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--sc-orange);border-radius:3px;width:36px}
  .lbl{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-1)}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="val">4</div></div>
    <div class="cell"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="val">8</div></div>
    <div class="cell"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="val">12</div></div>
    <div class="cell"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="val">16</div></div>
    <div class="cell"><div class="bar" style="height:24px"></div><div class="lbl">5</div><div class="val">24</div></div>
    <div class="cell"><div class="bar" style="height:32px"></div><div class="lbl">6</div><div class="val">32</div></div>
    <div class="cell"><div class="bar" style="height:48px"></div><div class="lbl">7</div><div class="val">48</div></div>
    <div class="cell"><div class="bar" style="height:64px"></div><div class="lbl">8</div><div class="val">64</div></div>
    <div class="cell"><div class="bar" style="height:96px"></div><div class="lbl">9</div><div class="val">96</div></div>
    <div class="cell"><div class="bar" style="height:128px"></div><div class="lbl">10</div><div class="val">128</div></div>
  </div>
</body></html>
