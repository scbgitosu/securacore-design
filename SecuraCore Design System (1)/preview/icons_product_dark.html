<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Service Icon Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:#000;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .cell img{width:72px;height:72px;object-fit:contain}
  .lbl{font-family:'Posterama',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#fff;font-weight:400}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/icon-dark-security.jpg"><div class="lbl">Security</div></div>
    <div class="cell"><img src="../assets/icon-dark-cameras.jpg"><div class="lbl">Cameras</div></div>
    <div class="cell"><img src="../assets/icon-dark-wifi.jpg"><div class="lbl">Wi-Fi</div></div>
    <div class="cell"><img src="../assets/icon-dark-tv.jpg"><div class="lbl">TV</div></div>
    <div class="cell"><img src="../assets/icon-dark-music.jpg"><div class="lbl">Music</div></div>
    <div class="cell"><img src="../assets/icon-dark-mobile.jpg"><div class="lbl">Mobile</div></div>
    <div class="cell"><img src="../assets/icon-dark-lights.jpg"><div class="lbl">Lights</div></div>
    <div class="cell"><img src="../assets/icon-dark-shades.jpg"><div class="lbl">Shades</div></div>
    <div class="cell"><img src="../assets/icon-dark-lock.jpg"><div class="lbl">Lock</div></div>
    <div class="cell"><img src="../assets/icon-dark-climate.jpg"><div class="lbl">Climate</div></div>
    <div class="cell"><img src="../assets/icon-dark-life-safety.jpg"><div class="lbl">Life-Safety</div></div>
    <div class="cell"><img src="../assets/icon-dark-solar.jpg"><div class="lbl">Solar</div></div>
  </div>
</body></html>
