<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-body)}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);min-width:80px}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:'Posterama',sans-serif;font-weight:700;font-size:12px;letter-spacing:.18em;text-transform:uppercase;padding:14px 22px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;transition:all .18s ease-out}
  .primary{background:var(--sc-orange);color:#fff}
  .primary.hover{background:var(--sc-orange-hover)}
  .primary.press{background:var(--sc-orange-press)}
  .secondary{background:var(--sc-ink);color:#fff}
  .ghost{background:transparent;color:var(--sc-ink);border:1px solid var(--border-strong)}
  .text{background:transparent;color:var(--sc-ink);padding:14px 4px;border-radius:0}
  .small{padding:10px 16px;font-size:11px}
</style></head>
<body>
  <div class="row"><span class="lbl">Primary</span><a class="btn primary">Book a consult →</a><a class="btn primary hover">Hover</a><a class="btn primary press">Pressed</a></div>
  <div class="row"><span class="lbl">Secondary</span><a class="btn secondary">Get a quote</a><a class="btn ghost">Learn more</a><a class="btn text">View services →</a></div>
  <div class="row"><span class="lbl">Small</span><a class="btn primary small">Contact us</a><a class="btn ghost small">Details</a></div>
</body></html>
