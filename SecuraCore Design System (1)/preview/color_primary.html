<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Brand Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:10px;overflow:hidden;border:1px solid var(--border-default)}
  .chip{height:90px}
  .meta{padding:10px 12px;background:#fff;display:flex;justify-content:space-between;align-items:center}
  .name{font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-1)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E36F1E"></div><div class="meta"><span class="name">Orange</span><span class="hex">#E36F1E</span></div></div>
    <div class="sw"><div class="chip" style="background:#1D252D"></div><div class="meta"><span class="name">Ink</span><span class="hex">#1D252D</span></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><span class="name">White</span><span class="hex">#FFFFFF</span></div></div>
    <div class="sw"><div class="chip" style="background:#000000"></div><div class="meta"><span class="name" style="color:#1D252D">Black</span><span class="hex">#000000</span></div></div>
  </div>
</body></html>
