<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:80px}
  .meta{padding:8px 10px;background:#fff}
  .name{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-1);display:block}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);display:block;margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1D252D"></div><div class="meta"><span class="name">900</span><span class="hex">#1D252D</span></div></div>
    <div class="sw"><div class="chip" style="background:#3A3F46"></div><div class="meta"><span class="name">700</span><span class="hex">#3A3F46</span></div></div>
    <div class="sw"><div class="chip" style="background:#6B6B6B"></div><div class="meta"><span class="name">500</span><span class="hex">#6B6B6B</span></div></div>
    <div class="sw"><div class="chip" style="background:#B0B0B0"></div><div class="meta"><span class="name">300</span><span class="hex">#B0B0B0</span></div></div>
    <div class="sw"><div class="chip" style="background:#D9D9D9"></div><div class="meta"><span class="name">200</span><span class="hex">#D9D9D9</span></div></div>
    <div class="sw"><div class="chip" style="background:#F2F2F2"></div><div class="meta"><span class="name">100</span><span class="hex">#F2F2F2</span></div></div>
    <div class="sw"><div class="chip" style="background:#F8F8F8"></div><div class="meta"><span class="name">50</span><span class="hex">#F8F8F8</span></div></div>
  </div>
</body></html>
