<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Service Icons — Light</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:#fff;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:18px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .cell img{width:64px;height:64px;object-fit:contain}
  .lbl{font-family:'Posterama',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--sc-ink);font-weight:400}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><img src="../assets/icon-security.png"><div class="lbl">Security</div></div>
    <div class="cell"><img src="../assets/icon-cameras.png"><div class="lbl">Cameras</div></div>
    <div class="cell"><img src="../assets/icon-wifi.png"><div class="lbl">Wi-Fi</div></div>
    <div class="cell"><img src="../assets/icon-tv.png"><div class="lbl">TV</div></div>
    <div class="cell"><img src="../assets/icon-music.png"><div class="lbl">Music</div></div>
    <div class="cell"><img src="../assets/icon-mobile.png"><div class="lbl">Mobile</div></div>
    <div class="cell"><img src="../assets/icon-lights.png"><div class="lbl">Lights</div></div>
    <div class="cell"><img src="../assets/icon-shades.png"><div class="lbl">Shades</div></div>
    <div class="cell"><img src="../assets/icon-lock.png"><div class="lbl">Lock</div></div>
    <div class="cell"><img src="../assets/icon-climate.png"><div class="lbl">Climate</div></div>
    <div class="cell"><img src="../assets/icon-life-safety.png"><div class="lbl">Life-Safety</div></div>
    <div class="cell"><img src="../assets/icon-solar.png"><div class="lbl">Solar</div></div>
  </div>
</body></html>
