<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#fff;font-family:'Open Sans',sans-serif}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border-subtle);background:#fff}
  .logo{height:104px;display:block}
  .right{display:flex;align-items:center}
  .links{display:flex;gap:32px;align-items:center;margin-right:40px}
  .links a{font-family:'Posterama',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--sc-ink);text-decoration:none;font-weight:400}
  .links a.active{color:var(--sc-orange)}
  .cta{background:var(--sc-orange);color:#fff;font-family:'Posterama',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:12px 18px;border-radius:8px;text-decoration:none;font-weight:700;text-align:center;display:inline-block}
</style></head>
<body>
  <div class="nav">
    <img class="logo" src="../assets/logo-securacore-horizontal.png">
    <div class="right">
      <div class="links">
        <a href="#" class="active">Home</a>
        <a href="#">Services</a>
        <a href="#">Projects</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
      <a class="cta" href="#">Book a consult</a>
    </div>
  </div>
</body></html>
