<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radius + Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-body)}
  h4{font-family:var(--font-display);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px;font-weight:400}
  .row{display:flex;gap:18px;margin-bottom:22px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:76px;height:60px;background:#fff;border:1px solid var(--border-default)}
  .shadow-box{width:76px;height:60px;background:#fff;border-radius:8px}
  .lbl{font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-1)}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <h4>Radius</h4>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="lbl">SM</div><div class="val">4px</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="lbl">MD</div><div class="val">8px</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="lbl">LG</div><div class="val">12px</div></div>
    <div class="cell"><div class="box" style="border-radius:20px"></div><div class="lbl">XL</div><div class="val">20px</div></div>
    <div class="cell"><div class="box" style="border-radius:999px"></div><div class="lbl">Pill</div><div class="val">999</div></div>
  </div>
  <h4>Shadow</h4>
  <div class="row" style="padding:12px 0 20px">
    <div class="cell"><div class="shadow-box" style="box-shadow:0 1px 2px rgba(29,37,45,.06),0 1px 1px rgba(29,37,45,.04)"></div><div class="lbl">SM</div></div>
    <div class="cell"><div class="shadow-box" style="box-shadow:0 4px 12px rgba(29,37,45,.08),0 1px 2px rgba(29,37,45,.04)"></div><div class="lbl">MD</div></div>
    <div class="cell"><div class="shadow-box" style="box-shadow:0 16px 40px rgba(29,37,45,.12),0 2px 6px rgba(29,37,45,.06)"></div><div class="lbl">LG</div></div>
    <div class="cell"><div class="shadow-box" style="box-shadow:0 28px 64px rgba(29,37,45,.18)"></div><div class="lbl">XL</div></div>
  </div>
</body></html>
