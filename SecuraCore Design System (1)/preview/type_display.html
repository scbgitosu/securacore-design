<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:var(--font-body)}
  .stack>*+*{margin-top:16px}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:lowercase;letter-spacing:0;margin-top:4px}
  .display{font-family:'Posterama',sans-serif;font-weight:700;font-size:64px;line-height:1;letter-spacing:.06em;text-transform:uppercase;color:var(--sc-ink);margin:0}
  .h1{font-family:'Posterama',sans-serif;font-weight:700;font-size:40px;line-height:1.05;letter-spacing:.07em;text-transform:uppercase;color:var(--sc-ink);margin:0}
  .h2{font-family:'Posterama',sans-serif;font-weight:400;font-size:28px;line-height:1.1;letter-spacing:.08em;text-transform:uppercase;color:var(--sc-ink);margin:0}
  .orange{color:var(--sc-orange)}
</style></head>
<body>
  <div class="stack">
    <div><div class="display">TECHNOLOGY <span class="orange">MADE</span> SIMPLE</div><div class="meta">Posterama Bold · 64 / 1.0 · +6% tracking</div></div>
    <div><div class="h1">SMART HOMES DONE RIGHT</div><div class="meta">Posterama Bold · 40 / 1.05 · +7% tracking</div></div>
    <div><div class="h2">WHOLE HOME WI-FI</div><div class="meta">Posterama Regular · 28 / 1.1 · +8% tracking</div></div>
  </div>
</body></html>
