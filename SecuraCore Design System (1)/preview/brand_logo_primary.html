<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:#fff;display:flex;align-items:center;justify-content:center;min-height:220px;font-family:var(--font-body)}
  .row{display:flex;align-items:center;gap:48px}
  img{display:block}
  .lockup-h{height:56px}
  .mark{height:80px}
  .stacked{height:120px}
  .lbl{font-family:var(--font-body);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sc-grey-500);text-align:center;margin-top:12px}
  .cell{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="row">
    <div class="cell"><img class="lockup-h" src="../assets/logo-securacore-horizontal.png" alt=""><div class="lbl">Horizontal</div></div>
    <div class="cell"><img class="stacked" src="../assets/logo-securacore-stacked.png" alt=""><div class="lbl">Stacked</div></div>
    <div class="cell"><img class="mark" src="../assets/logo-mark.png" alt=""><div class="lbl">Mark</div></div>
    <div class="cell"><img class="mark" src="../assets/logo-mark-monogram.png" alt=""><div class="lbl">Monogram</div></div>
  </div>
</body></html>
