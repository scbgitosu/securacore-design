<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px}
  .tile{border-radius:12px;overflow:hidden;position:relative;background:#000}
  .tile img{width:100%;height:100%;object-fit:cover;display:block}
  .a{aspect-ratio:16/9;grid-row:span 2}
  .b{aspect-ratio:1/1}
  .lbl{position:absolute;bottom:10px;left:12px;font-family:'Posterama',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.55);padding:4px 8px;border-radius:4px}
</style></head>
<body>
  <div class="grid">
    <div class="tile a"><img src="../assets/photo-smart-home-hero.png"><div class="lbl">Hero · Dusk</div></div>
    <div class="tile b"><img src="../assets/photo-home-driveway.png"><div class="lbl">Exterior</div></div>
    <div class="tile b"><img src="../assets/photo-living-room-theater.png"><div class="lbl">Interior</div></div>
    <div class="tile b"><img src="../assets/photo-home-exterior-01.png"><div class="lbl">Mountain home</div></div>
    <div class="tile b"><img src="../assets/photo-interior-01.png"><div class="lbl">Lifestyle</div></div>
  </div>
</body></html>
