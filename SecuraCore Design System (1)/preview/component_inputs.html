<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:#fff;font-family:'Open Sans',sans-serif}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  label{font-family:'Posterama',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-2);display:block;margin-bottom:6px;font-weight:400}
  input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--border-strong);border-radius:8px;font-family:'Open Sans',sans-serif;font-size:15px;color:var(--fg-1);background:#fff;box-sizing:border-box;outline:none}
  input:focus{border-color:var(--sc-orange);box-shadow:0 0 0 3px rgba(227,111,30,.15)}
  .hint{font-size:12px;color:var(--fg-3);margin-top:4px}
  .check{display:flex;gap:10px;align-items:center;margin-top:6px;font-size:14px;color:var(--fg-1)}
  .check input{width:18px;height:18px;accent-color:var(--sc-orange);margin:0}
</style></head>
<body>
  <div class="grid">
    <div>
      <label>Full name</label>
      <input value="Sarah Mitchell">
    </div>
    <div>
      <label>Email</label>
      <input value="sarah@example.com" style="border-color:var(--sc-orange);box-shadow:0 0 0 3px rgba(227,111,30,.15)">
      <div class="hint">We'll reply within one business day.</div>
    </div>
    <div>
      <label>Service needed</label>
      <select><option>Whole Home Wi-Fi</option></select>
    </div>
    <div>
      <label>City</label>
      <input placeholder="Bend, Sunriver, Sisters…">
    </div>
    <div style="grid-column:span 2">
      <div class="check"><input type="checkbox" checked> I'd like a free on-site consultation</div>
    </div>
  </div>
</body></html>
